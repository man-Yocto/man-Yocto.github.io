<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmad Al-Khasawneh | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a28;
      --accent: #7c5cfc;
      --accent2: #00e5ff;
      --accent3: #ff6f61;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --border: #2a2a3d;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* — NOISE OVERLAY — */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* — NAV — */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--accent2);
      letter-spacing: 2px;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent2); }

    /* — HERO — */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 8rem 3rem 4rem;
      gap: 4rem;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,92,252,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-text { z-index: 1; }

    .hero-tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent2);
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      animation: fadeDown 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    .hero h1 span { color: var(--accent); }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 2.5rem;
      line-height: 1.8;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--accent);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--accent);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-outline:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* — PHOTO — */
    .hero-photo {
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeUp 1s 0.4s ease both;
    }

    .photo-wrap {
      position: relative;
      width: 340px;
      height: 340px;
    }

    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 50%;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .photo-wrap::after {
      content: '';
      position: absolute;
      inset: 6px;
      background: var(--bg);
      border-radius: 50%;
      z-index: 1;
    }

    .photo-wrap img {
      position: absolute;
      inset: 6px;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      object-fit: cover;
      border-radius: 50%;
      z-index: 2;
    }

    .status-badge {
      position: absolute;
      bottom: 20px;
      right: 10px;
      z-index: 3;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text);
    }

    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* — SECTION SHARED — */
    section { padding: 6rem 3rem; }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent2);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .section-sub {
      color: var(--muted);
      max-width: 540px;
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    /* — STATS — */
    .stats-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      text-align: center;
    }

    .stat-num {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }

    /* — PROJECTS — */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      transition: border-color 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .project-card:hover::before { opacity: 1; }

    .project-tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      background: rgba(124,92,252,0.1);
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .project-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .project-desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .project-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tech-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .trophy-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,200,0,0.1);
      border: 1px solid rgba(255,200,0,0.3);
      color: #ffc800;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      margin-bottom: 0.75rem;
    }

    /* — SKILLS — */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .skill-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.75rem;
      transition: border-color 0.3s;
    }

    .skill-card:hover { border-color: var(--accent2); }

    .skill-icon {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .skill-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .skill-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    /* — TIMELINE — */
    .timeline {
      position: relative;
      max-width: 760px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .timeline-item {
      padding-left: 3rem;
      padding-bottom: 2.5rem;
      position: relative;
    }

    .timeline-dot {
      position: absolute;
      left: 6px; top: 4px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }

    .timeline-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent2);
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
    }

    .timeline-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .timeline-sub {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .timeline-desc {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    /* — CONTACT — */
    .contact-section { background: var(--surface); }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      max-width: 900px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 1rem;
      transition: all 0.25s;
    }

    .contact-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(6px);
    }

    .contact-link-icon {
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(124,92,252,0.1);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .contact-link-text { font-size: 0.9rem; }
    .contact-link-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); }

    /* — FOOTER — */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* — RESPONSIVE — */
    @media (max-width: 800px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 3rem; gap: 3rem; }
      .hero-photo { order: -1; }
      .photo-wrap { width: 240px; height: 240px; }
      section { padding: 4rem 1.5rem; }
      .stats-strip { grid-template-columns: 2fr 2fr; padding: 2rem 1.5rem; }
      .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
